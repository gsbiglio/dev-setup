---
- name: Development machine setup
  hosts: local
  gather_facts: true

  vars:
    homebrew_prefix: "{{ '/opt/homebrew' if ansible_facts['machine'] == 'arm64' else '/usr/local' }}"

  pre_tasks:
    - name: Require macOS
      ansible.builtin.assert:
        that: ansible_facts['system'] == "Darwin"
        fail_msg: This playbook only supports macOS.

    - name: Require Homebrew
      ansible.builtin.stat:
        path: "{{ homebrew_prefix }}/bin/brew"
      register: brew_binary

    - name: Fail if Homebrew is missing
      ansible.builtin.fail:
        msg: Run ./bootstrap.sh to install Homebrew and Ansible first.
      when: not brew_binary.stat.exists

    - name: Check Xcode Command Line Tools
      ansible.builtin.command: xcode-select -p
      register: xcode_clt
      changed_when: false
      failed_when: false

    - name: Fail if Xcode Command Line Tools are missing
      ansible.builtin.fail:
        msg: >-
          Xcode Command Line Tools are required. Run: xcode-select --install
      when: xcode_clt.rc != 0

  tasks:
    - name: Add Homebrew taps
      community.general.homebrew_tap:
        name: "{{ item }}"
        state: present
      loop: "{{ homebrew_taps }}"

    - name: Trust third-party Homebrew formulas
      ansible.builtin.command:
        argv:
          - brew
          - trust
          - --formula
          - "{{ item }}"
      environment:
        PATH: "{{ homebrew_prefix }}/bin:{{ ansible_env.PATH }}"
      loop: "{{ homebrew_trusted_formulas }}"
      changed_when: false

    - name: Install Homebrew formulas
      community.general.homebrew:
        name: "{{ item }}"
        state: present
        update_homebrew: "{{ ansible_loop.first }}"
      loop: "{{ homebrew_formulas }}"
      loop_control:
        extended: true

    - name: Install Homebrew casks
      community.general.homebrew_cask:
        name: "{{ item }}"
        state: present
        sudo_password: "{{ homebrew_sudo_password }}"
      loop: "{{ homebrew_casks }}"
      no_log: true

    - name: Install Python versions with uv
      ansible.builtin.command:
        argv:
          - uv
          - python
          - install
          - "{{ item }}"
      register: uv_python_install_result
      changed_when: uv_python_install_result.stdout is search('Installed Python')
      environment:
        PATH: "{{ homebrew_prefix }}/bin:{{ ansible_env.PATH }}"
      loop: "{{ python_versions }}"

    - name: Install global CLI tools with uv
      ansible.builtin.command:
        argv:
          - uv
          - tool
          - install
          - "{{ item }}"
      register: uv_tool_install_result
      changed_when: "'already installed' not in uv_tool_install_result.stdout"
      environment:
        PATH: "{{ homebrew_prefix }}/bin:{{ ansible_env.PATH }}"
      loop: "{{ uv_global_tools }}"

    - name: Configure shell PATH for Warp and zsh
      ansible.builtin.blockinfile:
        path: "{{ ansible_env.HOME }}/.zshrc"
        marker: "# >>> {mark} dev-setup >>>"
        block: |
          export PATH="{{ homebrew_prefix }}/bin:{{ homebrew_prefix }}/sbin:$PATH"
          export PATH="$HOME/.local/bin:$PATH"
        create: true

    - name: Ensure Neovim config directory exists
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/.config/nvim"
        state: directory
        mode: "0755"

    - name: Deploy Neovim configuration
      ansible.builtin.copy:
        src: files/nvim/init.lua
        dest: "{{ ansible_env.HOME }}/.config/nvim/init.lua"
        mode: "0644"
