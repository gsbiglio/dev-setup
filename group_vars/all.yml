---
homebrew_taps:
  - databricks/tap
  - anomalyco/tap

# Homebrew 6+ requires trusting third-party tap formulae before install.
# Prefer formula-level trust over trusting entire taps.
homebrew_trusted_formulas:
  - databricks/tap/databricks
  - anomalyco/tap/opencode

homebrew_formulas:
  - pyenv
  - pipx
  - postgresql@16
  - neovim
  - awscli
  - databricks
  - terraform
  - opencode

homebrew_casks:
  - google-chrome
  - whatsapp
  - docker-desktop
  - linear
  - cursor
  - spotify
  - nordlayer
  - dbeaver-community
  - alt-tab
  - rectangle
  - tad
  - ollama

pipx_packages:
  - ruff
  - bump-my-version
  - pre-commit

python_versions:
  - "3.9"
  - "3.10"
  - "3.11"
  - "3.12"
  - "3.13"
  - "3.14.5"
